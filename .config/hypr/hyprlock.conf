source = ~/.config/hypr/appearence/theme/colors.conf

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 2
}

input-field {
    monitor =
    size = 15%, 3%
    outline_thickness = 2
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgb(98, 104, 128)
    check_color = rgb(166, 209, 137)
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(108, 111, 133)
    fade_on_empty = false
    rounding = 5

    font_family = $font
    placeholder_text = ...
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME
    font_size = 60
    font_family = $font

    position = 0, 200
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 20
    font_family = $font

    position = 0, 130
    halign = center
    valign = center
}
