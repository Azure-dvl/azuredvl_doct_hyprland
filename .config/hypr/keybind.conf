source = ~/.config/hypr/programs.conf
$main = SUPER
$mod = SHIFT

# Aplications
bind = $main, E, exec, $fileManager
bind = $main, T, exec, $terminal
bind = $main, M, exec, $menu
bind = $main, B, exec, $navegador
bind = $main, S, exec, $search
bind = $main, C, exec, kitty cava
bind = $main, R, exec, kitty ranger
bind = $main, O, exec, kitty opencode

# Screenshot
bind = , Print, exec, bash -c 'grim -c -t png - | tee $HOME/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%s).png | wl-copy'

# LockScreen
bind = $main, L, exec, hyprlock
bind = $main $mod, L, exec,  command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# System
bind = $main, Q, killactive,

bind = $main, V, togglefloating,
bind = $main, F, fullscreen
bind = $main, P, pseudo,
bind = $main, J, togglesplit,


# Move focus
bind = $main, left, movefocus, l
bind = $main, right, movefocus, r
bind = $main, up, movefocus, u
bind = $main, down, movefocus, d

# Switch workspaces
bind = $main, 1, workspace, 1
bind = $main, 2, workspace, 2
bind = $main, 3, workspace, 3
bind = $main, 4, workspace, 4

# Move active window to a workspace with main + SHIFT + [0-9]
bind = $main $mod, 1, movetoworkspace, 1
bind = $main $mod, 2, movetoworkspace, 2
bind = $main $mod, 3, movetoworkspace, 3
bind = $main $mod, 4, movetoworkspace, 4

# Scroll through existing workspaces with main + scroll
bind = $main, mouse_down, workspace, e+1
bind = $main, mouse_up, workspace, e-1

# Move/resize windows with main + LMB/RMB and dragging
bindm = $main, mouse:272, movewindow
bindm = $main, mouse:273, resizewindow
