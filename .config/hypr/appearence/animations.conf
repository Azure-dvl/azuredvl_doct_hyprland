animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsIn, 1, 7, myBezier, slide
    animation = windowsOut, 1, 7, myBezier, slide
    animation = border, 1, 1, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, myBezier, slide

    animation = specialWorkspace, 1, 6, myBezier, slidevert
    animation = specialWorkspaceIn, 1, 6, myBezier, slidevert
    animation = specialWorkspaceOut, 1, 6, myBezier, slidevert
}


bezier = overshot, 0.5, 0.95, 0.1, 1.0
bezier = spring, 0.8, 0.8, 0.8, 1.0
bezier = direct, 0.0, 0.0, 1.0, 1.0

windowrule = match:class rofi, animation popin 10
layerrule = match:namespace rofi, animation popin spring 10
layerrule = match:namespace ndro-shell-wallpaper, animation slide 10 
layerrule = match:namespace ndro-shell-notifications, animation slide 10 
layerrule = match:namespace ndro-shell-settings, animation slide 10 
layerrule = match:namespace ndro-shell-bar, animation slide 10 
layerrule = match:namespace ndro-shell-dashboard, animation slide 10 

layerrule = match:namespace ndro-shell-bar, ignore_alpha 0.1 
layerrule = match:namespace ndro-shell-bar, blur on 
layerrule = match:namespace ndro-shell-bar, dim_around off 