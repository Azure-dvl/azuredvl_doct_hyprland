source = ~/.config/hypr/archives/config.conf

## Monitors
monitor=DP-1,1920x1080@60,0x0,1
monitor=HDMI-A-2,1920x1080@60,0x-1080,1

ecosystem:no_update_news = true

# Evironment variables

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = CLUTTER_BACKEND,wayland

# Editor
env = EDITOR,vim

# Cursor
env = XCURSOR_SIZE,20
env = XCURSOR_THEME,$cursor
env = HYPRCURSOR_SIZE,20
env = HYPRCURSOR_THEME,$cursor

# GDK
env = GDK_BACKEND,wayland
env = GDK_SCALE,1
env = GTK_THEME,$theme
env = GTK_ICON_THEME,$icon
env = GTK_FONT,$font

## Look
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 1

   # col.active_border = rgb(100,149,237)
   # col.inactive_border = rgba(595959aa)

    col.active_border = rgb(8aadf4) rgb(24273A) rgb(24273A) rgb(8aadf4) 30deg
    col.inactive_border = rgb(24273A) rgb(24273A) rgb(24273A) rgb(27273A) 90deg

    resize_on_border = true
    extend_border_grab_area = 30
    hover_icon_on_border = true
    resize_corner = 5
    allow_tearing = false
    layout = dwindle
}

decoration {
    dim_special = 0.2
    rounding = 6
    active_opacity = 1.0
    inactive_opacity = 0.8

    shadow {
        enabled = false
        range = 300
        render_power = 3
        color = rgba(1a1a1aaf)
        offset =  10 10
        ignore_window = true
    }

    blur {
	enabled = true
        size = 2
        popups = true
        passes = 4
        new_optimizations = true
        vibrancy = 0.3
        ignore_opacity = true
        special = true
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

cursor {
  no_hardware_cursors = false
  enable_hyprcursor = true
  warp_on_change_workspace = true
  no_warps = true
}

xwayland {
  enabled = true
  force_zero_scaling = true
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    vfr = true
    mouse_move_enables_dpms = true
    initial_workspace_tracking = 0
}

animations {
    enabled = yes, please :)

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
        disable_while_typing = true
        middle_button_emulation = true
        tap-to-click = true
    }
}
